spring:
  datasource:
    url: jdbc:postgresql://localhost:5433/verdurasia_db
    username: verdurasia
    password: verdurasia
    driver-class-name: org.postgresql.Driver

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  security:
    oauth2:
      resourceserver:
        jwt:
          # Keycloak corre en puerto 8180 (docker-compose).
          # Spring descarga automáticamente el JWKS desde este issuer para validar tokens.
          issuer-uri: http://localhost:8180/realms/verdurasia

springdoc:
  api-docs:
    path: /api/v3/api-docs
  swagger-ui:
    path: /api/swagger-ui.html

logging:
  level:
    com.verdurasia: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql: TRACE
    org.flywaydb: INFO
